<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCAP Analysis Tool (by: oxagast)</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-image: url("background.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
      }
    </style>
  </head>

  <body>
    <div class="container_box">
      <div class="top_bar">PacketSnitch</div>

      <div class="entry_bar">
        <div class="logo-cont">
          <img src="logo.png" />
        </div>
        <label style="color: white">ip/hostname:</label>
        <input id="host_filter" type="text" placeholder="0.0.0.0" disabled />
      </div>

      <div class="content_area">
        <div class="sidebar">
          <form
            method="post"
            enctype="multipart/form-data"
            id="jsonFile"
            name="jsonFile"
          >
            <input type="file" id="json-upload" name="json-up" hidden />
            <label for="json-upload" class="custom-btns">choose json</label>
          </form>
          <input
            type="button"
            id="summary-btn"
            value="Summary"
            class="custom-btns"
            hidden
          />

          <br />
          <!-- Dropdown menus -->
          <select id="target_hosts" hidden>
            <option>ALL hosts</option>
            <option>Localnet Hosts</option>
          </select>
        </div>

        <div id="main" class="main_panel">
          Choose a json decode using the button to the left.
        </div>
      </div>

      <div id="status" class="status_bar">Status: Ready</div>

      <div class="footer">oxasploits, llc (2026)</div>
    </div>
    <script type="text/javascript">
      const contentTarget = document.getElementById("json-upload");
      let packets = {};
      let final_summary = "";
      const status = document.getElementById("status");
      let hosts = ["0.0.0.0"];
      document
        .getElementById("json-upload")
        .addEventListener("change", function (event) {
          const file = event.target.files[0];
          if (file) {
            status.textContent = "Status: Selected file:" + file.name;
            setTimeout(() => {
              status.textContent = "Status: Ready";
            }, 3000);
            processFile(file);
          }
        });

      function build_table(h1, h2) {
        const main_panel = document.getElementById("main");

        main_panel.innerHTML =
          final_summary +
          "<br><br><hr><br>" +
          '<table width=80% class="main_panel" id="packet_space"><thead><tr><th width=25%>' +
          h1 +
          "</th><th>" +
          h2 +
          "</th></tr></thead><tbody></tbody></table>";
      }

      function processFile(file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const main_panel = document.getElementById("main");
          packets = JSON.parse(event.target.result);
          final_summary = packets["Final Summary"];
          if (final_summary == undefined) {
            main_panel.textContent = "Error: Final Summary not found in JSON.";
            status.textContent = "Error: Final Summary is undefined.";
            setTimeout(() => {
              status.textContent = "Status: Ready";
            }, 3000);
            return;
          }
          document.getElementById("target_hosts").hidden = false;
          document.getElementById("summary-btn").hidden = false;
          for (const host in packets["Host"]) {
            if (!hosts.includes(host)) {
              hosts.push(host);
              const targets_list = document.getElementById("target_hosts");
              const newhost = document.createElement("option");
              newhost.textContent = host;
              newhost.value = host;
              targets_list.appendChild(newhost);
            }
          }
          main_panel.textContent = final_summary;
        };

        reader.onerror = (error) => {
          status.textContent = "Status: Error reading file: " + error;
        };

        reader.readAsText(file);
      }

      function addRow(d1, d2) {
        // Get the table element in which you want to add row
        let ps = document.getElementById("packet_space");

        // Create a row using the inserRow() method and
        // specify the index where you want to add the row
        let row = ps.insertRow(-1); // We are adding at the end

        // Create table cells
        let c1 = row.insertCell(0);
        let c2 = row.insertCell(1);

        // Add data to c1 and c2
        c1.innerText = d1;
        c2.innerText = d2;
      }

      document
        .getElementById("target_hosts")
        .addEventListener("change", function () {
          const selected = document.getElementById("target_hosts").value;
          const host_filter = document.getElementById("host_filter");
          const main_panel = document.getElementById("main");
          const packet_space = document.getElementById("packet_space");
          if (host_filter.value !== selected) {
            host_filter.value = selected;
          }
          if (selected === "ALL hosts") {
            host_filter.value = "0.0.0.0";
          }
          build_table("Packet Info", "Details");
          const hostPackets = packets["Host"][selected];
          for (const packet in hostPackets) {
            if (packet !== "Summary") {
              const packetData = hostPackets[packet];
              for (const key in packetData) {
                if (key === "Packet Info") {
                  const packetInfo = packetData[key];
                  for (const info in packetInfo) {
                    if (info === "IP") {
                      const ipInfo = packetInfo[info];
                      for (const ipKey in ipInfo) {
                        addRow(ipKey, ipInfo[ipKey]);
                        status.textContent =
                          "Status: Displaying packet information for " +
                          selected;
                        setTimeout(() => {
                          status.textContent = "Status: Ready";
                        }, 3000);
                      }
                    }
                    if (info === "TCP") {
                      const tcpInfo = packetInfo[info];
                      if (tcpInfo["TCP Flag Data"]) {
                        flags = tcpInfo["TCP Flag Data"]["Flags"];
                        addRow("TCP Flags", flags);
                      }
                      // iterate over the rest of hte keys in tcpInfo and add them to the table
                      if (
                        tcpInfo["Source port"] &&
                        tcpInfo["Destination port"]
                      ) {
                        addRow("Source Port", tcpInfo["Source port"]);
                        addRow("Destination Port", tcpInfo["Destination port"]);
                        addRow("Urgent flag", tcpInfo["Urgent flag"]);
                        addRow("TCP Checksum", tcpInfo["TCP checksum"]);
                        console.log(
                          "Added TCP port information for " + selected,
                        );
                      }
                      status.textContent =
                        "Status: Displaying packet information for " + selected;
                      setTimeout(() => {
                        status.textContent = "Status: Ready";
                      }, 3000);
                    }
                  }
                  addRow("***", "***");
                }
              }
            }
          }
        });

      document
        .getElementById("summary-btn")
        .addEventListener("click", function () {
          document.getElementById("main").textContent = final_summary;
        });
    </script>
    <br />
  </body>
</html>
