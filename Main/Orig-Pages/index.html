<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCAP Analysis Tool (by: oxagast)</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      body {
        background-image: url("assets/images/background.webp");
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
      }
    </style>
  </head>

  <body>
    <div class="container_box">
      <div class="top_bar">
        <div class="titleline">PacketSnitch</div>
        <div class="byline">by oxasploits</div>
      </div>

      <div class="entry_bar">
        <div class="logo-cont">
          <img src="assets/images/logo.png" />
        </div>
        <label style="color: white">ip/hostname:</label>
        <input id="host_filter" type="text" placeholder="0.0.0.0" disabled />
      </div>

      <div class="content_area">
        <div class="sidebar">
          <form
            method="post"
            enctype="multipart/form-data"
            id="jsonFile"
            name="jsonFile"
          >
            <input type="file" id="json-upload" name="json-up" hidden />
            <label for="json-upload" class="custom-btns">choose json</label>
          </form>
          <input
            hidden
            type="button"
            id="summary-btn"
            value="Summary"
            class="custom-btns"
          />

          <br />
          <!-- Dropdown menus -->
          <select id="target_hosts" hidden>
            <option>ALL hosts</option>
            <option>Localnet Hosts</option>
          </select>
          <select id="Format" hidden>
            <option>Tables</option>
            <option>Pretty JSON</option>
            <option>Raw</option>
          </select>
        </div>

        <div id="main" class="main_panel">
          <div class="welcome_message">
            <h2>Welcome to PacketSnitch!</h2>
            <br />
          </div>
          Choose a json decode using the button to the left, then select an IP
          to inspect.
        </div>
      </div>

      <div id="status" class="status_bar">Status: Ready</div>

      <div class="footer">oxasploits, llc (&copy; 2026)</div>
    </div>
    <br />
    <script src="assets/scripts/scripts.js"></script>
  </body>
</html>
